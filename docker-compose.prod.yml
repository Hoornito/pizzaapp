services:
  app:
    build:
      context: ./apps/web
      dockerfile: ../../docker/Dockerfile
      target: production
    container_name: pizzaapp_web
    restart: always
    # No exponemos el 3000 al host: Caddy lo alcanza por la red interna.
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      TZ: America/Argentina/Buenos_Aires
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET}
      AUTH_FACEBOOK_ID: ${AUTH_FACEBOOK_ID}
      AUTH_FACEBOOK_SECRET: ${AUTH_FACEBOOK_SECRET}
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN}
      NEXT_PUBLIC_MERCADOPAGO_PUBLIC_KEY: ${NEXT_PUBLIC_MERCADOPAGO_PUBLIC_KEY}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
      WHATSAPP_BUSINESS_ACCOUNT_ID: ${WHATSAPP_BUSINESS_ACCOUNT_ID}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      JWT_SECRET: ${JWT_SECRET}
      QZ_CERTIFICATE_B64: ${QZ_CERTIFICATE_B64}
      QZ_PRIVATE_KEY_B64: ${QZ_PRIVATE_KEY_B64}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pizzaapp_network

  caddy:
    image: caddy:2-alpine
    container_name: pizzaapp_caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - pizzaapp_network

  postgres:
    image: postgres:16-alpine
    container_name: pizzaapp_postgres
    restart: always
    environment:
      TZ: America/Argentina/Buenos_Aires
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pizzaapp_network

  redis:
    image: redis:7-alpine
    container_name: pizzaapp_redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pizzaapp_network

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  pizzaapp_network:
    driver: bridge
